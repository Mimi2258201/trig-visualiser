<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigonometric Visualiser</title>
    <style>
        .circle {
            fill: lightblue;
            stroke: black;
            stroke-width: 2;
        }
        .axis {
            stroke: black;
            stroke-width: 2;
        }
        .value {
            font-size: 16px;
            fill: black;
        }
    </style>
</head>
<body>
    <svg width="500" height="500">
        <circle class="circle" cx="250" cy="250" r="200"></circle>
        <line class="axis" x1="250" y1="50" x2="250" y2="450"></line> <!-- Y-axis -->
        <line class="axis" x1="50" y1="250" x2="450" y2="250"></line> <!-- X-axis -->

        <!-- Position indicators for sin and cos -->
        <text class="value" x="450" y="250" id="cos">cos(θ)</text> <!-- Cosine displayed on the cos axis -->
        <text class="value" x="250" y="50" id="sin">sin(θ)</text> <!-- Sine displayed on the sin axis -->
        <text class="value" x="250" y="450" id="angle">θ</text> <!-- Angle position display -->
    </svg>
</body>
</html>
