<html>
<head>
    <title>Interactive Trig Visualiser</title>
    <style>
        /* Your CSS styles */
    </style>
</head>
<body>
    <h1>Interactive Trig Visualiser</h1>
    <canvas id="trigCanvas" width="800" height="600"></canvas>
    <script>
        // Setup for the canvas and rendering
        var canvas = document.getElementById('trigCanvas');
        var ctx = canvas.getContext('2d');

        function drawAxes() {
            ctx.beginPath();
            // Draw COS axis
            ctx.moveTo(100, 300);
            ctx.lineTo(700, 300);
            ctx.stroke();
            // Draw SIN axis
            ctx.moveTo(300, 100);
            ctx.lineTo(300, 500);
            ctx.stroke();
        }

        function drawCircle() {
            ctx.beginPath();
            ctx.arc(300, 300, 200, 0, 2 * Math.PI);
            ctx.stroke();
        }

        function repositionValues() {
            // Logic to reposition the values on the respective axes
            ctx.fillText('COS', 650, 290);
            ctx.fillText('SIN', 310, 100);
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawCircle();
            drawAxes();
            repositionValues();
        }

        render();
    </script>
</body>
</html>
