<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sin / Cos Unit Circle Visualiser</title>

<style>
body{
    background:#111;
    color:#eee;
    font-family:sans-serif;
    text-align:center;
}

canvas{
    background:#181818;
    border:1px solid #444;
    margin-top:20px;
}

button{
    margin-top:10px;
    padding:6px 12px;
}
</style>
</head>

<body>

<h2>Unit Circle – sin(θ) and cos(θ)</h2>
<canvas id="canvas" width="700" height="500"></canvas>
<br>
<button id="toggle">Start rotation</button>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const circle = {x:250,y:280};
const r = 150;

const cosAxisY = 80;
const sinAxisX = 520;

let angle = 0;
let dragging=false;
let rotating=false;

function normalizeDeg(rad){
    let deg = rad * 180 / Math.PI;
    deg = ((deg % 360) + 360) % 360;
    return deg;
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const cos = Math.cos(angle);
    const sin = Math.sin(angle);

    const px = circle.x + cos*r;
    const py = circle.y - sin*r;

    const cosAxisX = circle.x + cos*r;
    const sinAxisY = circle.y - sin*r;

    // circle
    ctx.beginPath();
    ctx.arc(circle.x,circle.y,r,0,Math.PI*2);
    ctx.strokeStyle="#888";
    ctx.stroke();

    // radius
    ctx.beginPath();
    ctx.moveTo(circle.x,circle.y);
    ctx.lineTo(px,py);
    ctx.strokeStyle="#aaa";
    ctx.stroke();

    // circle point
    ctx.beginPath();
    ctx.arc(px,py,7,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();

    // cos axis
    ctx.beginPath();
    ctx.moveTo(circle.x-r,cosAxisY);
    ctx.lineTo(circle.x+r,cosAxisY);
    ctx.strokeStyle="#4fc3f7";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(cosAxisX,cosAxisY,6,0,Math.PI*2);
    ctx.fillStyle="#4fc3f7";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(cosAxisX,cosAxisY);
    ctx.setLineDash([5,5]);
    ctx.strokeStyle="#4fc3f7";
    ctx.stroke();
    ctx.setLineDash([]);

    // sin axis
    ctx.beginPath();
    ctx.moveTo(sinAxisX,circle.y-r);
    ctx.lineTo(sinAxisX,circle.y+r);
    ctx.strokeStyle="#f06292";
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(sinAxisX,sinAxisY,6,0,Math.PI*2);
    ctx.fillStyle="#f06292";
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(sinAxisX,sinAxisY);
    ctx.setLineDash([5,5]);
    ctx.strokeStyle="#f06292";
    ctx.stroke();
    ctx.setLineDash([]);

    // angle arc
    ctx.beginPath();
    ctx.arc(circle.x,circle.y,40,0,-angle,true);
    ctx.strokeStyle="#ddd";
    ctx.stroke();

    // labels
    ctx.font="16px sans-serif";

    const deg = normalizeDeg(angle);

    ctx.fillStyle="#fff";
    ctx.fillText("θ = "+deg.toFixed(1)+"°",circle.x-35,circle.y+5);

    ctx.fillStyle="#4fc3f7";
    ctx.fillText("cos(θ) = "+cos.toFixed(3),circle.x-60,cosAxisY-15);

    ctx.fillStyle="#f06292";
    ctx.fillText("sin(θ) = "+sin.toFixed(3),sinAxisX+10,circle.y-r-10);
}

function setAngleFromMouse(e){

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    angle = Math.atan2(circle.y - my, mx - circle.x);
}

canvas.addEventListener("mousedown",e=>{
    dragging=true;
    setAngleFromMouse(e);
});

canvas.addEventListener("mousemove",e=>{
    if(dragging) setAngleFromMouse(e);
});

canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mouseleave",()=>dragging=false);

document.getElementById("toggle").onclick = () => {

    rotating = !rotating;

    document.getElementById("toggle").textContent =
        rotating ? "Stop rotation" : "Start rotation";
};

function loop(){

    if(rotating && !dragging){
        angle += 0.01;
    }

    draw();
    requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>
