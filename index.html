<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Interactive Trig Visualiser</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        canvas { display: block; margin: 20px auto; border: 1px solid black; }\n        #values { text-align: center; margin-top: 10px; }\n    </style>\n</head>\n<body>\n    <canvas id="trigCanvas" width="400" height="400"></canvas>\n    <div id="values">\n        <p>Angle: <span id="angleValue">0</span>°</p>\n        <p>sin: <span id="sinValue">0</span></p>\n        <p>cos: <span id="cosValue">0</span></p>\n    </div>\n    <script>\n        const canvas = document.getElementById('trigCanvas');\n        const ctx = canvas.getContext('2d');\n        const radius = 150;\n        const centerX = canvas.width / 2;\n        const centerY = canvas.height / 2;\n\n        function drawAxes() {\n            // Draw X and Y axes\n            ctx.beginPath();\n            ctx.moveTo(centerX, 0);\n            ctx.lineTo(centerX, canvas.height); // Y-axis\n            ctx.moveTo(0, centerY);\n            ctx.lineTo(canvas.width, centerY); // X-axis\n            ctx.stroke();\n            ctx.closePath();\n        }\n\n        function drawCircle() {\n            ctx.beginPath();\n            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);\n            ctx.stroke();\n            ctx.closePath();\n        }\n\n        function drawAngle(angle) {\n            const rad = angle * (Math.PI / 180);\n            const sinValue = Math.sin(rad);\n            const cosValue = Math.cos(rad);\n\n            // Clear canvas for redrawing\n            ctx.clearRect(0, 0, canvas.width, canvas.height);\n            drawCircle();\n            drawAxes();\n\n            // Draw angle line\n            ctx.beginPath();\n            ctx.moveTo(centerX, centerY);\n            ctx.lineTo(centerX + radius * cosValue, centerY - radius * sinValue);\n            ctx.stroke();\n            ctx.closePath();\n\n            // Update values\n            document.getElementById('angleValue').textContent = angle;\n            document.getElementById('sinValue').textContent = sinValue.toFixed(2);\n            document.getElementById('cosValue').textContent = cosValue.toFixed(2);\n        }\n\n        let currentAngle = 0;\n        setInterval(() => {\n            currentAngle = (currentAngle + 1) % 360;\n            drawAngle(currentAngle);\n        }, 100);\n    </script>\n</body>\n</html>
